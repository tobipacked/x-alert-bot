name: Run Playwright Bot

on:
  workflow_dispatch:
  schedule:
    - cron: '*/2 * * * *'   # every 2 min — balance of freshness vs. reliability

jobs:
  run-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed so the job can push seen_ids.json back

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install
