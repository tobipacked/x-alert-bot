name: Run Playwright Bot

on:
  workflow_dispatch:
  schedule:
    - cron: '*/2 * * * *'

jobs:
  run-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browsers + OS deps
        run: python -m playwright install --with-deps chromium

      # --- NEW STEP ADDED HERE ---
      - name: Restore login session
        run: |
          echo "${{ secrets.X_STORAGE_STATE }}" > storage_state.json

      - name: Run bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python bot.py

      - name: Upload debug screenshot (only if scraping failed)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshot
          path: debug_screenshot.png
          if-no-files-found: ignore
          retention-days: 3

      - name: Commit updated seen_ids.json
        if: always()
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          if [ -f seen_ids.json ]; then
            git add seen_ids.json
            git diff --staged --quiet && echo "No changes to commit" || git commit -m "Update seen tweet IDs [skip ci]"
            git push
          else
            echo "seen_ids.json does not exist yet, nothing to commit"
          fi
